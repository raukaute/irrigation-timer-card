# Multi-valve dashboard for the fdm5kw irrigation valves.
#
# The irrigation-timer-card now reads `valve_name` from the registry
# sensor's attributes, so each card auto-displays the SmartLife custom
# name (e.g. "S 809 (Green Carpet)"). Dropping the `name:` field lets
# that flow through; set `name:` only if you want to override.
#
# device_id: each timer card needs the Tuya ID of its own valve.
# Look it up in HA → Settings → Devices & Services → Xtend Tuya →
# click the valve → Device Info → "Identifier".

title: Solar Valves
views:
  # =========================================================================
  - title: S 809
    path: s-809
    type: sections
    max_columns: 3
    sections:
      - type: grid
        cards:
          - type: entities
            title: Controls
            show_header_toggle: false
            entities:
              - entity: switch.s_809_valve
                name: Valve
              - entity: switch.s_809_sleep_mode
                name: Sleep Mode
              - entity: number.s_809_watering_duration
                name: Duration (s)
              - entity: number.s_809_rain_snow_delay
                name: Rain/Snow Delay
            layout_options:
              grid_columns: 4
              grid_rows: auto
          - type: custom:irrigation-timer-card
            entity: sensor.s_809_green_carpet_irrigation_timer_registry
            device_id: bfbc9ae1e1ad6d3135vxmj
            layout_options:
              grid_columns: 4
              grid_rows: auto
      - type: grid
        cards:
          - type: history-graph
            title: Watering History
            hours_to_show: 24
            entities:
              - entity: switch.s_809_valve
                name: Valve
              - entity: sensor.s_809_watering_volume
                name: Volume
            layout_options:
              grid_columns: 4
              grid_rows: auto
          - type: entities
            title: Last Watering
            show_header_toggle: false
            entities:
              - entity: sensor.s_809
                name: Start
              - entity: sensor.s_809_2
                name: End
              - entity: sensor.s_809_watering_volume
                name: Volume
              - entity: sensor.s_809_watering_cycle
                name: Cycles
              - entity: sensor.s_809_3
                name: Mode
            layout_options:
              grid_columns: 4
              grid_rows: auto
      - type: grid
        cards:
          - type: tile
            grid_options:
              columns: 12
              rows: 3
            entity: sensor.s_809_battery_level
            name:
              type: entity
            state_content: state
            vertical: false
            features:
              - type: bar-gauge
              - type: trend-graph
            features_position: bottom
          - type: history-graph
            title: Battery History
            entities:
              - entity: sensor.s_809_battery_level
                name: Battery
            grid_options:
              rows: auto
              columns: 12
            max_y_axis: 100
            hours_to_show: 24

