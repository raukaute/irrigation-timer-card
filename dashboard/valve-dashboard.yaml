title: S 809 Valve
views:
  - title: S 809
    path: s-809
    type: sections
    max_columns: 3
    sections:
      # --- Controls + Battery (side by side) ---
      - type: grid
        cards:
          - type: entities
            title: Controls
            show_header_toggle: false
            entities:
              - entity: switch.s_809_valve
                name: Valve
              - entity: switch.s_809_sleep_mode
                name: Sleep Mode
              - entity: number.s_809_watering_duration
                name: Duration (s)
              - entity: number.s_809_rain_snow_delay
                name: Rain/Snow Delay
            layout_options:
              grid_columns: 4
              grid_rows: auto
          - type: gauge
            entity: sensor.s_809_battery_level
            name: Battery
            min: 0
            max: 100
            severity:
              green: 50
              yellow: 20
              red: 0
            layout_options:
              grid_columns: 4
              grid_rows: auto

      # --- Last Watering + Timers ---
      - type: grid
        cards:
          - type: entities
            title: Last Watering
            show_header_toggle: false
            entities:
              - entity: sensor.s_809
                name: Start
              - entity: sensor.s_809_2
                name: End
              - entity: sensor.s_809_watering_volume
                name: Volume
              - entity: sensor.s_809_watering_cycle
                name: Cycles
              - entity: sensor.s_809_3
                name: Mode
            layout_options:
              grid_columns: 4
              grid_rows: auto
          - type: custom:irrigation-timer-card
            entity: sensor.s_809_green_carpet_irrigation_timer_registry
            device_id: bfbc9ae1e1ad6d3135vxmj
            name: Timers
            layout_options:
              grid_columns: 4
              grid_rows: auto

      # --- History graphs ---
      - type: grid
        cards:
          - type: history-graph
            title: Watering History
            hours_to_show: 168
            entities:
              - entity: switch.s_809_valve
                name: Valve
              - entity: sensor.s_809_watering_volume
                name: Volume
            layout_options:
              grid_columns: 4
              grid_rows: auto
          - type: history-graph
            title: Battery History
            hours_to_show: 168
            entities:
              - entity: sensor.s_809_battery_level
                name: Battery
            layout_options:
              grid_columns: 4
              grid_rows: auto
